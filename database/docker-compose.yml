services:
  db:
    build:
      context: .
      dockerfile: Dockerfile
    image: migration_mysql
    container_name: bdd-projet
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    networks:
      - network-db
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  adminer:
    image: adminer
    container_name: adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - network-db

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: server_python
    container_name: server-api
    restart: on-failure:5
    ports:
      - "8000:8000"
    environment:
      - MYSQL_DATABASE=ynov_ci
      - MYSQL_USER=root
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_HOST=db
    depends_on:
      db:
        condition: service_healthy
    networks:
      - network-db
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/users || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  network-db:
    driver: bridge
